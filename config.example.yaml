# Copy to config.yaml. For Docker, mount it as /data/config.yaml and set
# claude_oauth.token_dir: "/data" so all state persists in the data volume.
server:
  port: 9090
  # admin_user: "admin"
  # admin_password: "changeme"
  # cert_file: "/path/to/cert.pem"   # enable HTTPS
  # key_file: "/path/to/key.pem"

vertex:
  project_id: "your-gcp-project-id"
  region: "us-east5"
  models:
    - name: "claude-sonnet-4-6"
      model: "claude-sonnet-4-6"
    - name: "claude-opus-4-6"
      model: "claude-opus-4-6"
    - name: "claude-haiku-4-5"
      model: "claude-haiku-4-5-20251001"

claude_oauth:
  enabled: true
  # token_dir: "/data"  # for Docker; defaults to ~/.llm-proxy
  models:
    - "claude-sonnet-4-6-oauth"
    - "claude-opus-4-6-oauth"
    - "claude-opus-4-8-oauth"

codex:
  enabled: true
  models:
    - "gpt-5.5"
    - "gpt-5.4"
    - "gpt-5.4-mini"
    - "gpt-5.3-codex"

# Kimi API key is read from the environment variable below. Never put the
# actual key in this file or commit it to Git.
kimi:
  enabled: false
  base_url: "https://api.moonshot.cn/v1"
  api_key_env: "MOONSHOT_API_KEY"
  api_format: "openai"  # use "anthropic" with https://api.kimi.com/coding
  models:
    - name: "kimi-k3"
      model: "kimi-k3"
    - name: "kimi-k2.7-code-highspeed"
      model: "kimi-k2.7-code-highspeed"
    - name: "kimi-k2.6"
      model: "kimi-k2.6"
